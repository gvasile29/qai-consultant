name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (excluding Ollama/ChromaDB integration tests)
        env:
          ANONYMIZED_TELEMETRY: "False"
          CHROMA_TELEMETRY: "False"
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_risk_analyzer.py \
            --deselect=tests/test_app_v03.py::test_both_documents_generated_and_stored \
            --deselect=tests/test_effort_estimator.py::test_full_estimate_bmw \
            -p no:warnings

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check src/ tests/ \
            --ignore E501,E402,F401,W291,W293
